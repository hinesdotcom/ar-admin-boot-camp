site_name: A&R Admin Boot Camp
site_description: Comprehensive documentation for A&R administration
site_author: A&R Administration Team
site_url: https://your-github-username.github.io/ar-admin-boot-camp/
repo_url: https://github.com/your-github-username/ar-admin-boot-camp
repo_name: ar-admin-boot-camp
edit_uri: edit/main/docs/

# Theme configuration
theme:
  name: material
  palette:
    # Dark mode toggle
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  
  # Language and features
  language: en
  features:
    # Navigation
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.top
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.expand
    - navigation.path
    - navigation.prune
    - navigation.indexes
    - navigation.tracking
    
    # Table of contents
    - toc.follow
    - toc.integrate
    
    # Search
    - search.suggest
    - search.highlight
    - search.share
    
    # Content
    - content.action.edit
    - content.action.view
    - content.code.copy
    - content.code.select
    - content.tabs.link
    - content.footnote.backlinks
    
    # Breadcrumbs
    - navigation.breadcrumbs

# Markdown extensions
markdown_extensions:
  # Python Markdown extensions
  - meta
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - footnotes
  - abbr
  - md_in_html
  - attr_list
  
  # pymdown extensions for advanced features
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:pymdownx.emoji.twemoji
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
  - pymdownx.highlight:
      use_pygments: true
      anchor_linenums: true
      auto_title: true
      linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Plugins
plugins:
  - search:
      lang: en
      separator: '[\s\-,:!=\[\]()"`/]+'
  - minify:
      minify_html: true
      minify_css: true
      minify_js: true

# Navigation structure
nav:
  - Home: index.md
  
  - Foundations:
    - foundations/what-is-ar-admin.md
    - foundations/team-structure.md
    - foundations/department-overview.md
    - foundations/project-lifecycle.md
  
  - Systems:
    - systems/atlas.md
    - systems/uniport.md
    - systems/vendor-setup.md
  
  - Finance:
    - finance/budgets.md
    - finance/advances.md
    - finance/purchase-orders.md
    - finance/payments.md
    - finance/recording-funds.md
  
  - Contracts:
    - contracts/deal-memos.md
    - contracts/producer-agreements.md
    - contracts/side-artist-agreements.md
    - contracts/label-waivers.md
    - contracts/talent-releases.md
  
  - Recording:
    - recording/recording-process.md
    - recording/producers.md
    - recording/mixers.md
    - recording/mastering.md
    - recording/atmos.md
    - recording/deliverables.md
  
  - Clearances:
    - clearances/samples.md
    - clearances/side-artists.md
    - clearances/unions.md
  
  - Credits:
    - credits/metadata.md
    - credits/label-copy.md
    - credits/publishing-info.md
  
  - Releases:
    - releases/release-readiness.md
    - releases/production-delivery.md
    - releases/vinyl.md
    - releases/spotify-pitch-tool.md
  
  - Publishing:
    - publishing/publishing-101.md
    - publishing/royalties.md
    - publishing/mechanicals.md
    - publishing/performance-rights.md
    - publishing/synchronization.md
  
  - Reference:
    - reference/glossary.md
    - reference/acronyms.md
    - reference/faq.md
    - reference/checklists.md

# Extra configuration
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/your-github-username/ar-admin-boot-camp
      name: GitHub
    - icon: fontawesome/brands/twitter
      link: https://twitter.com
      name: Twitter
  
  consent:
    title: Cookie consent
    description: >-
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.
    actions:
      - accept
      - reject

# Footer
extra_css:
  - stylesheets/extra.css

# Build settings for GitHub Pages
docs_dir: docs
site_dir: site
use_directory_urls: true
